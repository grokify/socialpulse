{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.PageTitle}} | {{.SiteTitle}}</title>
    <meta name="description" content="{{.SiteDescription}}">
    <link rel="stylesheet" href="{{.BaseURL}}/css/dashboard.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <a href="{{.BaseURL}}/" class="site-title">{{.SiteTitle}}</a>
        </div>
        <ul class="nav-links">
            <li><a href="{{.BaseURL}}/">Dashboard</a></li>
            <li><a href="{{.BaseURL}}/#articles">Articles</a></li>
            <li><a href="{{.BaseURL}}/#digests">Digests</a></li>
            <li><a href="{{.BaseURL}}/#tags">Tags</a></li>
        </ul>
    </nav>

    <main class="content">
        {{block "page-content" .}}{{end}}
    </main>

    <footer class="footer">
        <p>Generated by <a href="https://github.com/grokify/socialpulse">SocialPulse</a> on {{formatDateTime .GeneratedAt}}</p>
    </footer>

    <script src="{{.BaseURL}}/js/charts.js"></script>
</body>
</html>
{{end}}
